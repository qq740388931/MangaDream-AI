<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaDream AI - Feedback</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="page-wrap">
    <header class="header">
      <nav class="nav">
        <a class="nav__link" href="/">Home</a>
        <a class="nav__link" href="/feedback.html">Feedback</a>
        <a class="nav__link" href="/vip.html">Membership</a>
      </nav>
      <div class="header__top">
        <div class="header__brand">
          <h1 class="header__title">MangaDream AI</h1>
          <p class="header__subtitle">Become the Anime Hero, Instantly.</p>
        </div>
        <div id="userInfo" class="header-user"></div>
      </div>
    </header>

    <section class="generator">
      <p class="generator__intro">Share your thoughts, ideas, or issues—we read every message.</p>
      <div style="width: 100%; max-width: 600px;">
        <textarea id="feedbackContent" rows="6"
                  style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background:#1f1f1f; color:#f0f0f0;"
                  placeholder="Your feedback, ideas, or issues..."></textarea>
        <div style="margin-top: 12px; display:flex; justify-content:flex-end;">
          <button type="button" id="btnSubmitFeedback" class="btn btn--primary">Submit feedback</button>
        </div>
      </div>
    </section>
  </div>

  <div id="loginModal" class="modal" style="display: none;" aria-hidden="true"></div>

  <script src="app.js"></script>
  <script src="feedback.js"></script>
</body>
</html>
