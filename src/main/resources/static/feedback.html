<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaDream AI - 意见反馈</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="page-wrap">
    <header class="header">
      <nav class="nav">
        <a class="nav__link" href="/">首页</a>
        <a class="nav__link" href="/feedback.html">意见</a>
        <a class="nav__link" href="/vip.html">会员</a>
      </nav>
      <div class="header__top">
        <div class="header__brand">
          <h1 class="header__title">MangaDream AI</h1>
          <p class="header__subtitle">Become the Anime Hero, Instantly.</p>
        </div>
        <div id="userInfo" class="header-user"></div>
      </div>
    </header>

    <section class="generator">
      <p class="generator__intro">有什么想对我说的，都可以写在这里，我会认真看的。</p>
      <div style="width: 100%; max-width: 600px;">
        <textarea id="feedbackContent" rows="6"
                  style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background:#1f1f1f; color:#f0f0f0;"
                  placeholder="写下你的意见、想法或遇到的问题..."></textarea>
        <div style="margin-top: 12px; display:flex; justify-content:flex-end;">
          <button type="button" id="btnSubmitFeedback" class="btn btn--primary">提交意见</button>
        </div>
      </div>
    </section>
  </div>

  <div id="loginModal" class="modal" style="display: none;" aria-hidden="true">
    <!-- 简化：这里只使用登录弹窗由 app.js 控制，如果需要完整结构可复制 index.html 中的 -->
  </div>

  <script src="app.js"></script>
  <script src="feedback.js"></script>
</body>
</html>
